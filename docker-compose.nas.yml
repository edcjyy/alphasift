# AlphaSift WebUI — NAS Docker Compose 部署配置
#
# 使用方式:
#   docker compose -f docker-compose.nas.yml up -d
#
# 前提条件:
#   1. 飞牛 NAS 已安装 Docker
#   2. 已在 GitHub Actions 构建并推送镜像到 GHCR / Docker Hub
#   3. 在 NAS 上创建目录结构:
#      mkdir -p /vol1/1000/docker/alphasift/{data,logs,strategies}
#   4. 将 .env 文件放到 /vol1/1000/docker/alphasift/.env
#      （至少包含 TUSHARE_TOKEN、LLM 配置、DSA_API_URL 等）

x-common: &common
  image: ghcr.io/edcjyy/alphasift:latest
  restart: unless-stopped
  env_file:
    - /vol1/1000/docker/alphasift/.env
  volumes:
    - /vol1/1000/docker/alphasift/data:/app/data
    - /vol1/1000/docker/alphasift/logs:/app/logs
    - /vol1/1000/docker/alphasift/.env:/app/.env
    - /vol1/1000/docker/alphasift/strategies:/app/strategies:ro
  environment:
    - TZ=Asia/Shanghai
    - ALPHASIFT_DATA_DIR=/app/data
    - LOG_DIR=/app/logs
    - STRATEGIES_DIR=/app/strategies
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 384M

services:
  # AlphaSift WebUI（包含定时选股调度）
  webui:
    <<: *common
    container_name: alphasift-webui
    # 覆盖镜像默认端口 8080 → 19600
    command: ["uvicorn", "web.api.app:create_app", "--host", "0.0.0.0", "--port", "19600", "--factory"]
    ports:
      - "19600:19600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19600/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
