# 趋势质量策略
name: momentum_quality
display_name: 趋势质量
description: 兼顾趋势确认和基本面质量的中线候选发现
version: "1.0"
category: framework
tags: [momentum, quality, trend, llm_friendly]

screening:
  enabled: true
  market_scope: [cn]
  hard_filters:
    exclude_st: true
    amount_min: 200000000
    market_cap_min: 8000000000
    pe_ttm_min: 0
    pe_ttm_max: 60
    pb_min: 0
    pb_max: 8.0
    change_pct_min: -3.5
    change_pct_max: 7.5
    price_min: 4
    price_max: 220
    exclude_new_ipo_days: 60
  tech_weight: 0.45
  factor_weights:
    momentum: 0.25
    value: 0.15
    liquidity: 0.15
    activity: 0.10
    stability: 0.10
    theme_heat: 0.05
    size: 0.05
    quality: 0.15
  scoring_profile:
    momentum_sector_neutral: true
    momentum_chase_start_pct: 5.0
    activity_ideal_volume_ratio: 2.2
    activity_ideal_turnover_rate: 4.5
    stability_hot_change_pct: 6.5
  risk_profile:
    chase_change_pct: 7.5
    abnormal_volume_ratio: 5.5
    high_turnover_rate: 14.0
    low_llm_confidence: 0.50
  portfolio_profile:
    max_same_bucket: 2
    concentration_penalty: 3.5
    buckets:
      金融: [券商, 银行, 保险]
      消费: [白酒, 食品, 家电, 零售, 消费]
      AI算力: [AI算力, 算力, 数据中心, 服务器, 光模块]
      新能源: [新能源, 光伏, 锂电, 电池, 储能]
      周期: [钢铁, 煤炭, 有色, 化工]
  scorecard_profile:
    value_quality_bonus: 1.8
    capital_confirmed_bonus: 2.4
    volume_spike_ratio: 5.0
    hot_money_penalty: 2.5
  regime_weights:
    bullish:
      description: "牛市趋势延续性强，提高动量，放宽PE上限"
      filter_mult:
        pe_ttm_max: 1.20
      factor_mult:
        momentum: 1.20
        value: 0.80
        quality: 0.90
    bearish:
      description: "熊市趋势易断，切换为价值防御，收紧风险"
      filter_mult:
        pe_ttm_max: 0.75
        change_pct_max: 0.85
      factor_mult:
        value: 1.25
        quality: 1.25
        stability: 1.20
        momentum: 0.75
      risk_mult:
        chase_change_pct: 0.75
        abnormal_volume_ratio: 0.80
  ranking_hints: |
    优先关注：
    1. 已经确认趋势但还没有进入极端追涨阶段的候选
    2. 基本面质量（估值、资金活跃、稳定性）能为趋势提供支撑
    3. 避免单一题材过度集中，兼顾不同风格的趋势机会
  max_output: 5
