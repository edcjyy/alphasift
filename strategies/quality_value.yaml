# 稳健价值策略
name: quality_value
display_name: 稳健价值
description: 估值合理、流动性充足、波动不过热的稳健候选
version: "1.0"
category: value
tags: [value, quality, stability]

screening:
  enabled: true
  market_scope: [cn]
  hard_filters:
    exclude_st: true
    amount_min: 80000000
    pe_ttm_min: 0
    pe_ttm_max: 25
    pb_min: 0
    pb_max: 4.0
    market_cap_min: 10000000000
    market_cap_max: 800000000000
    change_pct_min: -3.5
    change_pct_max: 5.0
    price_min: 3
    price_max: 180
    exclude_new_ipo_days: 90
  tech_weight: 0.15
  factor_weights:
    value: 0.35
    quality: 0.20
    stability: 0.20
    liquidity: 0.15
    size: 0.10
  scoring_profile:
    value_sector_neutral: true
    momentum_chase_start_pct: 3.0
    activity_ideal_volume_ratio: 1.4
    activity_ideal_turnover_rate: 2.5
    stability_hot_change_pct: 4.5
    stability_high_turnover_rate: 8.0
    stability_high_volume_ratio: 4.0
  risk_profile:
    chase_change_pct: 5.5
    abnormal_volume_ratio: 4.5
    high_turnover_rate: 10.0
    low_llm_confidence: 0.45
  portfolio_profile:
    max_same_bucket: 2
    concentration_penalty: 3.0
    buckets:
      金融: [券商, 银行, 保险]
      消费: [白酒, 食品, 家电, 零售, 消费]
      公用事业: [电力, 燃气, 水务, 公用事业]
  scorecard_profile:
    value_quality_value_min: 72.0
    value_quality_stability_min: 68.0
    value_quality_bonus: 2.8
    volume_spike_ratio: 4.0
  regime_weights:
    bullish:
      description: "牛市价值不占优，微量降低价值、引入动量"
      filter_mult:
        pe_ttm_max: 1.10
      factor_mult:
        value: 0.90
        quality: 1.05
    bearish:
      description: "熊市防御——强化价值+稳定，收紧估值上限"
      filter_mult:
        pe_ttm_max: 0.75
        pb_max: 0.85
      factor_mult:
        value: 1.25
        stability: 1.25
        quality: 1.15
      risk_mult:
        chase_change_pct: 0.80
        abnormal_volume_ratio: 0.75
  ranking_hints: |
    优先关注：
    1. 估值合理且不是依赖单日情绪推动的标的
    2. 成交额足够、涨跌幅不过热，适合后续深度分析
    3. 兼顾行业地位、现金流质量、分红或经营稳定性线索
  max_output: 5
